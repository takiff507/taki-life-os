<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Offline personal dashboard for tasks, habits, focus, notes, expenses, and data backups.">
  <title>Taki Life OS</title>
  <style>
    :root{color-scheme:light;--bg:#f6f3ec;--panel:#fffdf8;--panel2:#efebe0;--text:#1d242b;--muted:#68737b;--line:#d7d1c3;--teal:#17756b;--teal2:#0f5c54;--red:#d95d47;--amber:#d99a24;--blue:#386fa4;--shadow:0 18px 42px rgba(29,36,43,.11)}
    body.dark{color-scheme:dark;--bg:#181b1d;--panel:#23282b;--panel2:#1d2225;--text:#f6f3ec;--muted:#a8b0b5;--line:#3a4247;--shadow:0 18px 42px rgba(0,0,0,.25)}
    *{box-sizing:border-box}html{min-height:100%}body{min-height:100%;margin:0;background:linear-gradient(135deg,rgba(23,117,107,.12),transparent 32%),linear-gradient(315deg,rgba(217,93,71,.12),transparent 34%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{color:inherit}.app{min-height:100vh;display:grid;grid-template-columns:260px minmax(0,1fr)}.side{position:sticky;top:0;height:100vh;padding:20px;border-right:1px solid var(--line);background:rgba(255,253,248,.78);backdrop-filter:blur(16px);display:grid;grid-template-rows:auto 1fr auto;gap:22px}.dark .side{background:rgba(35,40,43,.84)}.brand{display:flex;gap:12px;align-items:center}.mark{width:42px;height:42px;border-radius:8px;display:grid;place-items:center;background:var(--teal);color:#fff;font-weight:900}.brand strong,.brand small{display:block}.brand small,.muted,.eyebrow,.card span{color:var(--muted)}.nav{display:grid;align-content:start;gap:8px}.nav button,.btn{min-height:42px;border-radius:8px;border:1px solid transparent;padding:0 14px;background:transparent;cursor:pointer;font-weight:800}.nav button{text-align:left}.nav button:hover,.nav button.active,.btn.ghost{border-color:var(--line);background:var(--panel2)}.main{width:min(1240px,calc(100% - 32px));margin:0 auto;padding:28px 0 42px}.top{min-height:86px;display:flex;align-items:center;justify-content:space-between;gap:20px}.eyebrow{margin:0 0 5px;font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:0}h1,h2,h3,p{margin-top:0}h1{margin-bottom:0;font-size:2.15rem;line-height:1.05}h2{margin:0;font-size:1rem}.date,.panel,.card,.item,.col{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}.date{min-width:210px;padding:14px 16px}.date strong{display:block;margin-top:4px;font-size:1.35rem}.view{display:none}.view.active{display:block}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:14px}.card{min-height:110px;padding:18px;box-shadow:none}.card strong{display:block;margin-top:12px;font-size:2rem;line-height:1}.grid2,.taskgrid,.focusgrid,.notesgrid,.expensegrid{display:grid;gap:14px}.grid2{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.panel{padding:18px}.head{min-height:36px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.row{display:flex;gap:10px;flex-wrap:wrap}input,select,textarea{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);outline:none}input,select{min-height:42px;padding:0 12px}textarea{width:100%;resize:vertical;padding:12px;line-height:1.45}input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(23,117,107,.16)}.btn.primary{background:var(--teal);color:#fff}.btn.primary:hover{background:var(--teal2)}.btn.danger{border-color:rgba(217,93,71,.35);background:rgba(217,93,71,.12);color:var(--red)}.list{display:grid;gap:10px}.item{padding:13px;box-shadow:none}.item p{margin-bottom:4px}.taskgrid{grid-template-columns:repeat(3,minmax(0,1fr));margin-top:14px}.col{min-height:360px;padding:14px;box-shadow:none}.col header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.pill{display:inline-flex;min-height:24px;align-items:center;border-radius:999px;padding:0 8px;font-size:.75rem;font-weight:900;background:var(--panel2);color:var(--muted)}.mini{min-height:30px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);cursor:pointer;padding:0 9px;font-size:.78rem;font-weight:800}.habit{display:grid;grid-template-columns:minmax(130px,1fr) auto;gap:12px;align-items:center}.days{display:grid;grid-template-columns:repeat(7,34px);gap:6px}.day{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);cursor:pointer;font-size:.72rem;color:var(--muted)}.day.done{background:var(--teal);border-color:var(--teal);color:#fff}.focusgrid{grid-template-columns:minmax(280px,420px) 1fr}.timer{text-align:center}.face{margin:24px auto;width:min(100%,320px);aspect-ratio:1;border:10px solid rgba(23,117,107,.18);border-radius:50%;display:grid;place-items:center;font-size:4rem;font-weight:900;color:var(--teal);background:var(--panel2)}.notesgrid{grid-template-columns:330px 1fr}.noteslist{min-height:520px}.active-note{outline:3px solid rgba(23,117,107,.18)}.expensegrid{grid-template-columns:380px 1fr;margin-top:14px}.barrow{display:grid;grid-template-columns:82px 1fr 62px;align-items:center;gap:10px}.track{height:14px;overflow:hidden;border-radius:999px;background:var(--panel2)}.fill{height:100%;min-width:4px;border-radius:999px;background:var(--teal)}.file{position:relative;overflow:hidden}.file input{position:absolute;inset:0;opacity:0;cursor:pointer}.empty{color:var(--muted);margin-bottom:0}@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:static;height:auto;grid-template-rows:auto auto auto}.nav{grid-template-columns:repeat(4,minmax(0,1fr))}.nav button{text-align:center}.grid4,.grid2,.taskgrid,.focusgrid,.notesgrid,.expensegrid{grid-template-columns:1fr}.col{min-height:220px}}@media(max-width:560px){.main{width:min(100% - 20px,720px);padding-top:18px}.top{align-items:stretch;flex-direction:column}.date{min-width:0}.nav{grid-template-columns:repeat(2,minmax(0,1fr))}.grid4{grid-template-columns:1fr 1fr}.row{flex-direction:column}.habit{grid-template-columns:1fr}.days{grid-template-columns:repeat(7,minmax(0,1fr))}.day{width:auto}.face{font-size:3rem}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><div class="mark">T</div><div><strong>Taki Life OS</strong><small>Offline dashboard</small></div></div>
      <nav class="nav" id="nav"></nav>
      <div><button class="btn ghost" id="themeBtn">Theme</button><p class="muted" id="saveMsg">Saved locally</p></div>
    </aside>
    <main class="main">
      <header class="top"><div><p class="eyebrow">Today</p><h1 id="title">Dashboard</h1></div><div class="date"><span id="dateText"></span><strong id="clockText"></strong></div></header>
      <section class="view active" id="dashboard"><div class="grid4" id="metrics"></div><div class="grid2"><div class="panel"><div class="head"><h2>Quick Capture</h2></div><form class="row" id="quickForm"><input id="quickTask" placeholder="Add a task" maxlength="90"><button class="btn primary">Add</button></form><div class="list" id="dashTasks"></div></div><div class="panel"><div class="head"><h2>Habit Pulse</h2></div><div class="list" id="dashHabits"></div></div><div class="panel wide"><div class="head"><h2>Weekly Focus</h2></div><div class="list" id="focusBars"></div></div></div></section>
      <section class="view" id="tasks"><div class="panel"><div class="head"><h2>Task Board</h2></div><form class="row" id="taskForm"><input id="taskTitle" placeholder="Task title" maxlength="90" required><select id="taskPri"><option>low</option><option selected>normal</option><option>high</option></select><input id="taskDue" type="date"><button class="btn primary">Add Task</button></form></div><div class="taskgrid" id="board"></div></section>
      <section class="view" id="habits"><div class="panel"><div class="head"><h2>Habit Tracker</h2></div><form class="row" id="habitForm"><input id="habitName" placeholder="New habit" maxlength="50" required><button class="btn primary">Add Habit</button></form></div><div class="list" id="habitList"></div></section>
      <section class="view" id="focus"><div class="focusgrid"><div class="panel timer"><div class="head"><h2>Focus Timer</h2></div><div class="face" id="face">25:00</div><div class="row" style="justify-content:center"><button class="btn primary" id="startBtn">Start</button><button class="btn ghost" id="pauseBtn">Pause</button><button class="btn ghost" id="resetBtn">Reset</button></div><div class="row" style="justify-content:center;margin-top:18px"><label class="muted">Focus <input id="focusMin" type="number" min="5" max="90" value="25" style="width:95px"></label><label class="muted">Break <input id="breakMin" type="number" min="1" max="30" value="5" style="width:95px"></label></div></div><div class="panel"><div class="head"><h2>Session Log</h2></div><div class="list" id="sessions"></div></div></div></section>
      <section class="view" id="notes"><div class="notesgrid"><div class="panel noteslist"><div class="head"><h2>Notes</h2><button class="btn ghost" id="newNote">New</button></div><input id="noteSearch" placeholder="Search notes" style="width:100%;margin-bottom:12px"><div class="list" id="noteList"></div></div><div class="panel"><form id="noteForm" class="list"><input id="noteTitle" placeholder="Note title" maxlength="80"><textarea id="noteBody" rows="14" placeholder="Write a note"></textarea><div class="row"><button class="btn primary">Save Note</button><button class="btn danger" type="button" id="deleteNote">Delete</button></div></form></div></div></section>
      <section class="view" id="expenses"><div class="panel"><div class="head"><h2>Expense Tracker</h2></div><form class="row" id="expenseForm"><input id="expenseLabel" placeholder="Expense" maxlength="60" required><input id="expenseAmount" type="number" min="0" step="0.01" placeholder="Amount" required><select id="expenseCat"><option>Food</option><option>Travel</option><option>Study</option><option>Tools</option><option>Other</option></select><input id="expenseDate" type="date"><button class="btn primary">Add</button></form></div><div class="expensegrid"><div class="panel"><div class="head"><h2>Categories</h2></div><div class="list" id="expenseBars"></div></div><div class="panel"><div class="head"><h2>Recent Expenses</h2></div><div class="list" id="expenseList"></div></div></div></section>
      <section class="view" id="data"><div class="panel"><div class="head"><h2>Data Vault</h2></div><div class="row"><button class="btn primary" id="exportBtn">Export JSON</button><label class="btn ghost file">Import JSON<input id="importFile" type="file" accept="application/json"></label><button class="btn ghost" id="demoBtn">Load Demo</button><button class="btn danger" id="resetData">Reset</button></div><div class="list" id="summary" style="margin-top:18px"></div></div></section>
    </main>
  </div>
  <script>
    const KEY='taki-life-os-v2', views=['dashboard','tasks','habits','focus','notes','expenses','data'], statuses=[['todo','To Do'],['doing','Doing'],['done','Done']], day=86400000;
    const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
    const id=p=>p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7);
    const iso=o=>new Date(Date.now()+(o||0)*day).toISOString().slice(0,10);
    const money=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);
    const short=d=>d?new Intl.DateTimeFormat('en',{month:'short',day:'numeric'}).format(new Date(d)):'No date';
    const esc=s=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    function demo(){const t=iso(),y=iso(-1);return{theme:'light',tasks:[{id:id('task'),title:'Design the weekly plan',status:'todo',priority:'high',due:t},{id:id('task'),title:'Finish portfolio README',status:'doing',priority:'normal',due:iso(1)},{id:id('task'),title:'Clean downloads folder',status:'done',priority:'low',due:y}],habits:[{id:id('habit'),name:'Read 20 minutes',logs:{[y]:1,[t]:1}},{id:id('habit'),name:'Workout',logs:{[iso(-2)]:1,[y]:1}},{id:id('habit'),name:'No junk food',logs:{[iso(-3)]:1,[iso(-2)]:1,[y]:1,[t]:1}}],notes:[{id:id('note'),title:'Project Ideas',body:'Life OS roadmap:\n- Profile README\n- Habit insights\n- Better export cards',updated:Date.now()},{id:id('note'),title:'Daily Log',body:'Keep the dashboard simple and useful.',updated:Date.now()-60000}],expenses:[{id:id('exp'),label:'Course notes',amount:12,cat:'Study',date:t},{id:id('exp'),label:'Lunch',amount:8,cat:'Food',date:t},{id:id('exp'),label:'Domain idea',amount:10,cat:'Tools',date:y}],focus:{min:25,brk:5,sessions:[{id:id('sess'),min:25,date:iso(-2),label:'Deep work'},{id:id('sess'),min:50,date:y,label:'Build sprint'}]}}}
    function load(){try{return JSON.parse(localStorage.getItem(KEY))||demo()}catch{return demo()}}
    let state=load(), selected=state.notes[0]?.id||null, timer={run:false,left:(state.focus?.min||25)*60,loop:null};
    function save(){localStorage.setItem(KEY,JSON.stringify(state));$('#saveMsg').textContent='Saved locally';setTimeout(()=>$('#saveMsg').textContent='Offline ready',800)}
    function nav(v){if(!views.includes(v))v='dashboard';$$('.view').forEach(x=>x.classList.toggle('active',x.id===v));$$('#nav button').forEach(x=>x.classList.toggle('active',x.dataset.v===v));$('#title').textContent=v[0].toUpperCase()+v.slice(1);location.hash=v}
    function render(){document.body.classList.toggle('dark',state.theme==='dark');$('#focusMin').value=state.focus.min;$('#breakMin').value=state.focus.brk;clock();dash();tasks();habits();focus();notes();expenses();summary()}
    function clock(){const n=new Date();$('#dateText').textContent=new Intl.DateTimeFormat('en',{weekday:'long',month:'short',day:'numeric'}).format(n);$('#clockText').textContent=new Intl.DateTimeFormat('en',{hour:'2-digit',minute:'2-digit'}).format(n)}
    function list(el,arr,map){el.replaceChildren();if(!arr.length){el.innerHTML='<p class="empty">Nothing here yet.</p>';return}el.append(...arr.map(map))}
    function item(t,m,buttons){const e=document.createElement('article');e.className='item';e.innerHTML='<p><strong>'+esc(t)+'</strong></p><span class="muted">'+esc(m||'')+'</span>';if(buttons){const r=document.createElement('div');r.className='row';r.style.marginTop='10px';buttons.forEach(b=>{const x=document.createElement('button');x.className='mini';x.type='button';x.textContent=b[0];x.dataset[b[1]]=b[2];r.append(x)});e.append(r)}return e}
    function dash(){const month=iso().slice(0,7), open=state.tasks.filter(t=>t.status!=='done').length, ht=state.habits.filter(h=>h.logs[iso()]).length, fm=state.focus.sessions.reduce((s,x)=>s+Number(x.min||0),0), spend=state.expenses.filter(e=>e.date.startsWith(month)).reduce((s,e)=>s+Number(e.amount||0),0);$('#metrics').innerHTML=[['Open tasks',open],['Habits today',ht+'/'+state.habits.length],['Focus minutes',fm],['Month spend',money(spend)]].map(m=>'<article class="card"><span>'+m[0]+'</span><strong>'+m[1]+'</strong></article>').join('');list($('#dashTasks'),state.tasks.filter(t=>t.status!=='done').slice(0,5),t=>item(t.title,'due '+short(t.due)));list($('#dashHabits'),state.habits.slice(0,5),h=>item(h.name,(h.logs[iso()]?'Done today':'Open today')+' - '+streak(h)+' day streak'));bars($('#focusBars'),last7().map(d=>[short(d),state.focus.sessions.filter(s=>s.date===d).reduce((a,s)=>a+Number(s.min||0),0)+'m',state.focus.sessions.filter(s=>s.date===d).reduce((a,s)=>a+Number(s.min||0),0)]))}
    function bars(el,rows){const max=Math.max(1,...rows.map(r=>Number(r[2])||0));el.innerHTML=rows.map(r=>'<div class="barrow"><span class="muted">'+r[0]+'</span><span class="track"><span class="fill" style="width:'+Math.max(4,(Number(r[2]||0)/max)*100)+'%"></span></span><strong>'+r[1]+'</strong></div>').join('')}
    function tasks(){const b=$('#board');b.replaceChildren(...statuses.map(([s,n])=>{const c=document.createElement('section');c.className='col';const arr=state.tasks.filter(t=>t.status===s);c.innerHTML='<header><h2>'+n+'</h2><span class="pill">'+arr.length+'</span></header><div class="list"></div>';list(c.querySelector('.list'),arr,t=>item(t.title,t.priority+' - '+short(t.due),[['To Do','move:'+t.id,'todo'],['Doing','move:'+t.id,'doing'],['Done','move:'+t.id,'done'],['Edit','edit',t.id],['Delete','delTask',t.id]]));return c}))}
    function habits(){list($('#habitList'),state.habits,h=>{const e=document.createElement('article');e.className='item habit';e.innerHTML='<div><p><strong>'+esc(h.name)+'</strong></p><span class="muted">'+streak(h)+' day streak</span></div><div class="days"></div><div class="row"><button class="mini" data-del-habit="'+h.id+'">Delete</button></div>';last7().forEach(d=>{const x=document.createElement('button');x.className='day '+(h.logs[d]?'done':'');x.textContent=short(d).split(' ')[1];x.dataset.habit=h.id;x.dataset.date=d;e.querySelector('.days').append(x)});return e})}
    function focus(){if(!timer.left)timer.left=state.focus.min*60;$('#face').textContent=String(Math.floor(timer.left/60)).padStart(2,'0')+':'+String(timer.left%60).padStart(2,'0');list($('#sessions'),[...state.focus.sessions].reverse().slice(0,12),s=>item(s.min+' minute session',short(s.date)+' - '+(s.label||'Focus')))}
    function notes(){const q=$('#noteSearch').value.toLowerCase(), arr=state.notes.filter(n=>(n.title+n.body).toLowerCase().includes(q)).sort((a,b)=>b.updated-a.updated);list($('#noteList'),arr,n=>{const e=item(n.title||'Untitled',new Date(n.updated).toLocaleString());e.dataset.note=n.id;e.classList.toggle('active-note',n.id===selected);return e});const n=state.notes.find(x=>x.id===selected)||state.notes[0];if(n){selected=n.id;$('#noteTitle').value=n.title;$('#noteBody').value=n.body;$('#deleteNote').disabled=false}else{$('#noteTitle').value='';$('#noteBody').value='';$('#deleteNote').disabled=true}}
    function expenses(){list($('#expenseList'),[...state.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,18),e=>item(e.label,money(e.amount)+' - '+e.cat+' - '+short(e.date),[['Delete','delExp',e.id]]));const month=iso().slice(0,7), totals={};state.expenses.filter(e=>e.date.startsWith(month)).forEach(e=>totals[e.cat]=(totals[e.cat]||0)+Number(e.amount||0));bars($('#expenseBars'),Object.entries(totals).map(([k,v])=>[k,money(v),v]))}
    function summary(){list($('#summary'),[['Tasks',state.tasks.length],['Habits',state.habits.length],['Notes',state.notes.length],['Expenses',state.expenses.length],['Focus sessions',state.focus.sessions.length]],x=>item(x[0],String(x[1])))}
    function last7(){return[-6,-5,-4,-3,-2,-1,0].map(iso)}function streak(h){let n=0;for(let i=0;i<365;i++){if(!h.logs[iso(-i)])break;n++}return n}
    function addTask(title){state.tasks.push({id:id('task'),title,status:'todo',priority:$('#taskPri')?.value||'normal',due:$('#taskDue')?.value||''});save();render()}
    $('#nav').innerHTML=views.map(v=>'<button data-v="'+v+'">'+v[0].toUpperCase()+v.slice(1)+'</button>').join('');$('#nav').onclick=e=>{if(e.target.dataset.v)nav(e.target.dataset.v)};$('#themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';save();render()};$('#quickForm').onsubmit=e=>{e.preventDefault();if($('#quickTask').value.trim()){addTask($('#quickTask').value.trim());$('#quickTask').value=''}};$('#taskForm').onsubmit=e=>{e.preventDefault();addTask($('#taskTitle').value.trim());$('#taskTitle').value='';$('#taskDue').value=''};$('#board').onclick=e=>{const d=e.target.dataset;if(Object.keys(d).some(k=>k.startsWith('move:'))){const key=Object.keys(d).find(k=>k.startsWith('move:')),idv=key.split(':')[1],t=state.tasks.find(x=>x.id===idv);if(t)t.status=d[key]}if(d.edit){const t=state.tasks.find(x=>x.id===d.edit),n=prompt('Edit task',t.title);if(n?.trim())t.title=n.trim()}if(d.delTask)state.tasks=state.tasks.filter(t=>t.id!==d.delTask);save();render()};$('#habitForm').onsubmit=e=>{e.preventDefault();state.habits.push({id:id('habit'),name:$('#habitName').value.trim(),logs:{}});$('#habitName').value='';save();render()};$('#habitList').onclick=e=>{const d=e.target.dataset;if(d.habit){const h=state.habits.find(x=>x.id===d.habit);h.logs[d.date]?delete h.logs[d.date]:h.logs[d.date]=1}if(d.delHabit)state.habits=state.habits.filter(h=>h.id!==d.delHabit);save();render()};function pause(){clearInterval(timer.loop);timer.run=false}$('#startBtn').onclick=()=>{if(timer.run)return;timer.run=true;timer.loop=setInterval(()=>{timer.left--;if(timer.left<=0){pause();state.focus.sessions.push({id:id('sess'),min:state.focus.min,date:iso(),label:'Focus'});timer.left=state.focus.brk*60;save()}focus();dash()},1000)};$('#pauseBtn').onclick=pause;$('#resetBtn').onclick=()=>{pause();timer.left=state.focus.min*60;focus()};$('#focusMin').onchange=$('#breakMin').onchange=()=>{state.focus.min=Number($('#focusMin').value||25);state.focus.brk=Number($('#breakMin').value||5);timer.left=state.focus.min*60;save();render()};$('#newNote').onclick=()=>{const n={id:id('note'),title:'',body:'',updated:Date.now()};state.notes.unshift(n);selected=n.id;save();render();$('#noteTitle').focus()};$('#noteList').onclick=e=>{const box=e.target.closest('[data-note]');if(box){selected=box.dataset.note;notes()}};$('#noteSearch').oninput=notes;$('#noteForm').onsubmit=e=>{e.preventDefault();let n=state.notes.find(x=>x.id===selected);if(!n){n={id:id('note'),title:'',body:'',updated:Date.now()};state.notes.push(n);selected=n.id}n.title=$('#noteTitle').value.trim()||'Untitled';n.body=$('#noteBody').value;n.updated=Date.now();save();render()};$('#deleteNote').onclick=()=>{state.notes=state.notes.filter(n=>n.id!==selected);selected=state.notes[0]?.id||null;save();render()};$('#expenseDate').value=iso();$('#expenseForm').onsubmit=e=>{e.preventDefault();state.expenses.push({id:id('exp'),label:$('#expenseLabel').value.trim(),amount:Number($('#expenseAmount').value||0),cat:$('#expenseCat').value,date:$('#expenseDate').value||iso()});$('#expenseLabel').value='';$('#expenseAmount').value='';save();render()};$('#expenseList').onclick=e=>{if(e.target.dataset.delExp){state.expenses=state.expenses.filter(x=>x.id!==e.target.dataset.delExp);save();render()}};$('#exportBtn').onclick=()=>{const a=document.createElement('a'),blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});a.href=URL.createObjectURL(blob);a.download='taki-life-os-'+iso()+'.json';a.click();URL.revokeObjectURL(a.href)};$('#importFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;state=JSON.parse(await f.text());selected=state.notes[0]?.id||null;save();render()};$('#demoBtn').onclick=()=>{state=demo();selected=state.notes[0]?.id||null;save();render()};$('#resetData').onclick=()=>{if(confirm('Reset all local data?')){state=demo();state.tasks=[];state.habits=[];state.notes=[];state.expenses=[];state.focus={min:25,brk:5,sessions:[]};selected=null;save();render()}};window.onhashchange=()=>nav(location.hash.slice(1));nav(location.hash.slice(1)||'dashboard');render();setInterval(clock,30000);
